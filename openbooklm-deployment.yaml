      - args:
        - |
          set -e
          apt-get update
          apt-get install -y git openssl libssl-dev ca-certificates
          npm install -g pnpm
          git clone -b feat/connor/backend-structure https://github.com/open-biz/openbooklm.git
          cd openbooklm
          pnpm install
          npx prisma generate
          pnpm build
          pnpm start
