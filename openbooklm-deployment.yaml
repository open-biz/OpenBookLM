apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbooklm
  namespace: openbooklm
  labels:
    app: openbooklm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openbooklm
  template:
    metadata:
      labels:
        app: openbooklm
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        # Frontend container
        - name: frontend
          image: ghcr.io/open-biz/openbooklm:main
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_URL
            - name: NODE_ENV
              value: 'production'
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: openbooklm-config
                  key: API_URL
            - name: NEXT_PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: openbooklm-config
                  key: BASE_URL
            - name: CEREBRAS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-credentials
                  key: CEREBRAS_API_KEY
            - name: NEXT_PUBLIC_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: google-credentials
                  key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: google-credentials
                  key: GOOGLE_CLIENT_SECRET
            - name: NEXT_PUBLIC_GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: google-credentials
                  key: NEXT_PUBLIC_GOOGLE_API_KEY
          resources:
            requests:
              cpu: '500m'
              memory: '1Gi'
            limits:
              cpu: '1000m'
              memory: '2Gi'
        
        # Backend container
        - name: backend
          image: ghcr.io/open-biz/openbooklm-backend:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: CEREBRAS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-credentials
                  key: CEREBRAS_API_KEY
            - name: LLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-credentials
                  key: LLAMA_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-credentials
                  key: OPENAI_API_KEY
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-credentials
                  key: GROQ_API_KEY
          resources:
            requests:
              cpu: '500m'
              memory: '2Gi'
            limits:
              cpu: '1000m'
              memory: '4Gi'