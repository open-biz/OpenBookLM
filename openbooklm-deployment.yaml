        image: node:20-slim
        imagePullPolicy: IfNotPresent
        name: frontend
        ports:
        - containerPort: 3000
          protocol: TCP
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: 125m
            memory: 1Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      - args:
        - |
          set -e
          apt-get update
          apt-get install -y git python3-pip python3-venv ffmpeg libsndfile1 libportaudio2
          git clone -b feat/connor/backend-structure https://github.com/open-biz/openbooklm.git
          cd openbooklm
          chmod +x setup/create_venv.sh
          # Install packages in smaller groups to manage memory better
          python3 -m venv venv
          . venv/bin/activate
          pip install --no-cache-dir -U pip setuptools wheel
          # Install core dependencies first
          pip install --no-cache-dir torch transformers scipy numpy
          # Install remaining packages
          pip install --no-cache-dir -r requirements.txt
          # Run the Groq server
          python3 backend/main.py
        command:
        - /bin/sh
        - -c
