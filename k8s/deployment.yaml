apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbooklm
  labels:
    app: openbooklm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openbooklm
  template:
    metadata:
      labels:
        app: openbooklm
    spec:
      containers:
        - name: openbooklm
          image: node:20-slim
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: clerk-credentials
                  key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: clerk-credentials
                  key: CLERK_SECRET_KEY
          command: ['/bin/sh', '-c']
          args:
            - |
              apt-get update
              apt-get install -y git openssl libssl-dev ca-certificates
              npm install -g pnpm
              git clone -b dev https://github.com/open-biz/openbooklm.git /app
              cd /app
              pnpm install
              npx prisma generate
              pnpm build
              pnpm start
          resources:
            requests:
              cpu: '500m'
              memory: '1Gi'
            limits:
              cpu: '1000m'
              memory: '2Gi'
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 180
            periodSeconds: 15
            timeoutSeconds: 5
